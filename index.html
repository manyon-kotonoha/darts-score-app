<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Darts Score</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16161d;
            --primary: #7b2cbf;
            --secondary: #3c096c;
            --accent: #9d4edd;
            --text: #e0e1dd;
            --team-a: #ff4d6d;
            --team-b: #00b4d8;
            --skip: #6c757d;
            --win-gold: #ffd700;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--secondary); box-shadow: 0 8px 32px rgba(0,0,0,0.8); margin-bottom: 20px; }
        h2 { color: var(--accent); font-size: 1.1rem; display: flex; align-items: center; gap: 8px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; outline: none; box-sizing: border-box; }
        input, select { background: #240046; color: white; border: 1px solid var(--secondary); }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .hidden { display: none; }
        .member-item { background: #1e1e26; padding: 10px; margin: 8px 0; border-radius: 12px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 10px; }
        .team-btn { padding: 6px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; min-width: 65px; text-align: center; }
        .status-none { background: #333; color: #888; }
        .status-A { background: var(--team-a); color: white; }
        .status-B { background: var(--team-b); color: white; }
        .status-skip { background: var(--skip); color: white; }
        
        .icon-btn { background: transparent; width: auto; padding: 5px; color: #666; margin: 0; }
        .icon-btn:hover { color: var(--accent); }

        /* 履歴周りのスタイル */
        .stats-container { background: #000; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        .stats-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .history-item { font-size: 0.85rem; border-bottom: 1px solid #222; padding: 10px 5px; }
        .history-main { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-details { background: #000; border-radius: 8px; padding: 8px; margin-top: 8px; font-size: 0.75rem; line-height: 1.4; display: none; }
        .history-details.active { display: block; }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .score-box { text-align: center; padding: 15px; border-radius: 12px; background: #000; border: 2px solid transparent; cursor: pointer; }
        .score-box.active { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .team-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .score-val { font-size: 2.8rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        .members-small { font-size: 0.65rem; opacity: 0.6; min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card">
        <h1><span class="material-symbols-outlined">target</span> Midnight Darts</h1>
        <input type="password" id="login-pass" placeholder="パスコードを入力">
        <button onclick="login()"><span class="material-symbols-outlined">login</span> ログイン</button>
    </div>

    <div id="view-lobby" class="card hidden">
        <section>
            <h2><span class="material-symbols-outlined">leaderboard</span> 勝利数ランキング</h2>
            <div id="stats-list" class="stats-container">集計中...</div>
        </section>

        <section>
            <h2><span class="material-symbols-outlined">history</span> 直近の履歴</h2>
            <div id="history-list" style="max-height: 250px; overflow-y: auto; background: #000; border-radius: 8px; padding: 5px;"></div>
        </section>

        <hr style="border:0.1px solid #333; margin:20px 0;">

        <section>
            <h2><span class="material-symbols-outlined">person_add</span> メンバー登録</h2>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-member-name" placeholder="名前を入力" style="margin:0;">
                <button onclick="addMember()" style="width: auto; margin:0;"><span class="material-symbols-outlined">add</span></button>
            </div>
            <ul id="member-list-ui" style="list-style:none; padding:0; margin-top: 20px;"></ul>
        </section>

        <hr style="border:0.1px solid #333; margin:20px 0;">
        <select id="game-type" style="margin-top:5px;">
            <option value="301">01 (301)</option>
            <option value="501">01 (501)</option>
            <option value="countup">カウントアップ</option>
        </select>
        <button onclick="startGame()" style="background:var(--accent); margin-top:10px;">
            <span class="material-symbols-outlined">play_arrow</span> 対戦スタート
        </button>
    </div>

    <div id="view-game" class="card hidden">
        <h2 id="game-title-display">対戦中</h2>
        <div class="game-grid">
            <div id="box-A" class="score-box active" onclick="setTarget('A')">
                <div class="team-label" style="color:var(--team-a)">TEAM A</div>
                <div class="members-small" id="game-members-A"></div>
                <div class="score-val" id="score-A">0</div>
            </div>
            <div id="box-B" class="score-box" onclick="setTarget('B')">
                <div class="team-label" style="color:var(--team-b)">TEAM B</div>
                <div class="members-small" id="game-members-B"></div>
                <div class="score-val" id="score-B">0</div>
            </div>
        </div>
        <div style="text-align: center; margin-bottom: 10px; font-size: 0.8rem; opacity: 0.8;">
            入力対象: <strong id="target-label">TEAM A</strong>
        </div>
        <input type="number" id="input-points" placeholder="得点入力" inputmode="numeric" style="font-size: 1.5rem; text-align: center;">
        <button onclick="submitScore()" style="background:var(--accent);"><span class="material-symbols-outlined">check_circle</span> スコア更新</button>
        <button onclick="finishGame()" style="background:#444; margin-top:20px;"><span class="material-symbols-outlined">sports_score</span> ゲーム終了・判定</button>
    </div>

    <div id="view-result" class="card hidden">
        <h2 style="justify-content: center; color: gold;">
            <span class="material-symbols-outlined">workspace_premium</span> 結果発表
        </h2>
        <div id="winner-announcement" style="text-align: center; font-size: 2rem; font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px var(--accent);"></div>
        <div class="stats-container">
            <div class="stats-row"><span>TEAM A</span><span id="result-score-A"></span></div>
            <div class="stats-row"><span>TEAM B</span><span id="result-score-B"></span></div>
        </div>
        <button onclick="saveAndExit()" style="background:var(--primary); margin-top:20px;"><span class="material-symbols-outlined">save</span> 履歴を保存してTOPへ</button>
        <button onclick="showView('view-lobby')" style="background:transparent; border: 1px solid #555; color:#888;">保存せずに戻る</button>
    </div>
</div>

<script>
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let members = [];
    let currentGame = { type: '', teamA: [], teamB: [], scoreA: 0, scoreB: 0 };
    let currentTarget = 'A';

    function login() {
        const pass = document.getElementById('login-pass').value;
        if(pass === "1234111") { showView('view-lobby'); loadData(); }
        else { alert("パスワードが違います"); }
    }

    async function loadData() { await loadMembers(); await loadHistory(); }

    async function loadMembers() {
        const { data, error } = await supabaseClient.from('members').select('*').order('id', { ascending: true });
        if(!error) { members = data.map(m => ({ ...m, status: 'none' })); renderMembers(); }
    }

    function renderMembers() {
        const ui = document.getElementById('member-list-ui');
        if(!ui) return;
        ui.innerHTML = members.length === 0 ? '<p style="text-align:center; opacity:0.5;">登録なし</p>' : 
            members.map((m, index) => `
                <li class="member-item">
                    <div style="font-weight:bold; font-size:0.9rem;">${m.name}</div>
                    <div class="team-btn status-${m.status}" onclick="toggleTeam(${index})">
                        ${m.status === 'none' ? '未選択' : m.status === 'A' ? 'Aチーム' : m.status === 'B' ? 'Bチーム' : '不参加'}
                    </div>
                    <button class="icon-btn" onclick="deleteMember(${m.id})"><span class="material-symbols-outlined" style="font-size:1.2rem;">delete</span></button>
                </li>
            `).join('');
    }

    function toggleTeam(index) {
        const states = ['none', 'A', 'B', 'skip'];
        members[index].status = states[(states.indexOf(members[index].status) + 1) % states.length];
        renderMembers();
    }

    async function addMember() {
        const name = document.getElementById('new-member-name').value;
        if(name) { await supabaseClient.from('members').insert([{ name }]); document.getElementById('new-member-name').value = ''; loadMembers(); }
    }

    async function deleteMember(id) {
        if (confirm("削除しますか？")) { await supabaseClient.from('members').delete().eq('id', id); loadMembers(); }
    }

    function startGame() {
        const teamA = members.filter(m => m.status === 'A').map(m => m.name);
        const teamB = members.filter(m => m.status === 'B').map(m => m.name);
        if(teamA.length === 0 && teamB.length === 0) return alert("チームを選んでください");

        const type = document.getElementById('game-type').value;
        currentGame = { type, teamA, teamB, scoreA: (type === 'countup' ? 0 : parseInt(type)), scoreB: (type === 'countup' ? 0 : parseInt(type)) };
        
        document.getElementById('game-members-A').innerText = teamA.join(', ');
        document.getElementById('game-members-B').innerText = teamB.join(', ');
        document.getElementById('game-title-display').innerText = type.toUpperCase();
        
        updateScoreDisplay();
        setTarget('A');
        showView('view-game');
    }

    function setTarget(team) {
        currentTarget = team;
        document.getElementById('box-A').classList.toggle('active', team === 'A');
        document.getElementById('box-B').classList.toggle('active', team === 'B');
        document.getElementById('target-label').innerText = `TEAM ${team}`;
        document.getElementById('target-label').style.color = team === 'A' ? 'var(--team-a)' : 'var(--team-b)';
    }

    function submitScore() {
        const pts = parseInt(document.getElementById('input-points').value) || 0;
        const key = `score${currentTarget}`;
        if(currentGame.type === 'countup') currentGame[key] += pts;
        else {
            if(currentGame[key] - pts < 0) alert("バースト！");
            else currentGame[key] -= pts;
        }
        document.getElementById('input-points').value = '';
        updateScoreDisplay();
    }

    function updateScoreDisplay() {
        document.getElementById('score-A').innerText = currentGame.scoreA;
        document.getElementById('score-B').innerText = currentGame.scoreB;
    }

    function finishGame() {
        let text = "";
        const sA = currentGame.scoreA; const sB = currentGame.scoreB;
        if (currentGame.type === 'countup') {
            if (sA > sB) text = "TEAM A WIN!"; else if (sB > sA) text = "TEAM B WIN!"; else text = "DRAW GAME";
        } else {
            if (sA < sB) text = "TEAM A WIN!"; else if (sB < sA) text = "TEAM B WIN!"; else text = "DRAW GAME";
        }
        document.getElementById('winner-announcement').innerText = text;
        document.getElementById('result-score-A').innerText = sA;
        document.getElementById('result-score-B').innerText = sB;
        showView('view-result');
    }

    async function saveAndExit() {
        await supabaseClient.from('scores').insert([{
            game_type: currentGame.type,
            details: { final_score: `A:${currentGame.scoreA} - B:${currentGame.scoreB}`, team_a_names: currentGame.teamA.join(','), team_b_names: currentGame.teamB.join(','), winner: document.getElementById('winner-announcement').innerText }
        }]);
        await loadData();
        showView('view-lobby');
    }

    // --- 履歴表示（アコーディオン形式） ---
    async function loadHistory() {
        const { data, error } = await supabaseClient.from('scores').select('*').order('created_at', { ascending: false });
        if(error) return;

        const histUi = document.getElementById('history-list');
        histUi.innerHTML = data.slice(0, 10).map((h, i) => {
            const winTxt = h.details.winner || "";
            const isAWin = winTxt.includes("TEAM A WIN");
            const isBWin = winTxt.includes("TEAM B WIN");

            // 名前を分割して王冠付与
            const namesA = h.details.team_a_names.split(',').map(n => isAWin ? `${n}👑` : n).join(', ');
            const namesB = h.details.team_b_names.split(',').map(n => isBWin ? `${n}👑` : n).join(', ');

            return `
                <div class="history-item">
                    <div class="history-main" onclick="toggleDetails(${i})">
                        <div style="flex-grow:1;">
                            <span style="color:var(--accent); font-weight:bold;">${h.game_type}</span>
                            <span style="${isAWin ? 'color:var(--win-gold);' : 'color:var(--team-a);'} font-weight:bold; margin-left:8px;">A</span>
                            <span style="opacity:0.5;"> vs </span>
                            <span style="${isBWin ? 'color:var(--win-gold);' : 'color:var(--team-b);'} font-weight:bold;">B</span>
                            <span style="margin-left:8px; opacity:0.8; font-size:0.75rem;">(${h.details.final_score})</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <span class="material-symbols-outlined" style="font-size:1.2rem; opacity:0.5;">expand_more</span>
                            <button class="icon-btn" onclick="event.stopPropagation(); deleteHistory(${h.id})">
                                <span class="material-symbols-outlined" style="font-size:1.1rem;">delete</span>
                            </button>
                        </div>
                    </div>
                    <div id="details-${i}" class="history-details">
                        <div style="margin-bottom:4px;"><strong style="color:var(--team-a)">Team A:</strong> ${namesA}</div>
                        <div><strong style="color:var(--team-b)">Team B:</strong> ${namesB}</div>
                        <div style="margin-top:5px; opacity:0.5; font-size:0.6rem;">日時: ${new Date(h.created_at).toLocaleString()}</div>
                    </div>
                </div>`;
        }).join('');

        // ランキング更新（勝利数）
        const winCount = {};
        data.forEach(h => {
            const winTxt = h.details.winner || "";
            const winners = winTxt.includes("TEAM A WIN") ? h.details.team_a_names : winTxt.includes("TEAM B WIN") ? h.details.team_b_names : null;
            if(winners) winners.split(',').forEach(n => { if(n) winCount[n] = (winCount[n] || 0) + 1; });
        });
        const sorted = Object.entries(winCount).sort((a,b) => b[1] - a[1]);
        document.getElementById('stats-list').innerHTML = sorted.length > 0 ? sorted.map(([name, count], i) => `<div class="stats-row"><span>${i+1}位 ${name}</span><span>${count}勝</span></div>`).join('') : "データなし";
    }

    function toggleDetails(index) {
        const el = document.getElementById(`details-${index}`);
        el.classList.toggle('active');
    }

    async function deleteHistory(id) { if (confirm("削除しますか？")) { await supabaseClient.from('scores').delete().eq('id', id); loadHistory(); } }

    function showView(viewId) {
        ['view-login', 'view-lobby', 'view-game', 'view-result'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>
</body>
</html>
