<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Darts Score</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16161d;
            --primary: #7b2cbf;
            --secondary: #3c096c;
            --accent: #9d4edd;
            --text: #e0e1dd;
            --team-a: #ff4d6d;
            --team-b: #00b4d8;
            --skip: #6c757d;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--secondary); box-shadow: 0 8px 32px rgba(0,0,0,0.8); margin-bottom: 20px; }
        h2 { color: var(--accent); font-size: 1.1rem; display: flex; align-items: center; gap: 8px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; outline: none; box-sizing: border-box; }
        input, select { background: #240046; color: white; border: 1px solid var(--secondary); }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .hidden { display: none; }
        .member-item { background: #1e1e26; padding: 10px; margin: 8px 0; border-radius: 12px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 10px; }
        .team-btn { padding: 6px 10px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; min-width: 65px; text-align: center; }
        .status-none { background: #333; color: #888; }
        .status-A { background: var(--team-a); color: white; }
        .status-B { background: var(--team-b); color: white; }
        .status-skip { background: var(--skip); color: white; }
        
        .icon-btn { background: transparent; width: auto; padding: 5px; color: #666; margin: 0; }
        .icon-btn:hover { color: var(--accent); }

        .stats-container { background: #000; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        .stats-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .history-item { font-size: 0.75rem; padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .score-display { font-size: 4rem; text-align: center; font-weight: bold; text-shadow: 0 0 10px var(--accent); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card">
        <h1><span class="material-symbols-outlined">target</span> ダーツスコア記録 <span class="material-symbols-outlined">target</span></h1>
        <input type="password" id="login-pass" placeholder="パスコードを入力">
        <button onclick="login()"><span class="material-symbols-outlined">login</span> ログイン</button>
    </div>

    <div id="view-lobby" class="card hidden">
        <section>
            <h2><span class="material-symbols-outlined">leaderboard</span> 勝利数ランキング</h2>
            <div id="stats-list" class="stats-container">集計中...</div>
        </section>

        <section>
            <h2><span class="material-symbols-outlined">history</span> 直近の履歴</h2>
            <div id="history-list" style="max-height: 120px; overflow-y: auto; background: #000; border-radius: 8px;"></div>
        </section>

        <hr style="border:0.1px solid #333; margin:20px 0;">

        <section>
            <h2><span class="material-symbols-outlined">person_add</span> メンバー登録</h2>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-member-name" placeholder="名前を入力" style="margin:0;">
                <button onclick="addMember()" style="width: auto; margin:0;"><span class="material-symbols-outlined">add</span></button>
            </div>
            <ul id="member-list-ui" style="list-style:none; padding:0; margin-top: 20px;">
                <p style="text-align:center; opacity:0.5;">読み込み中...</p>
            </ul>
        </section>

        <hr style="border:0.1px solid #333; margin:20px 0;">

        <button onclick="startGame()" style="background:var(--accent); margin-top:10px;">
            <span class="material-symbols-outlined">play_arrow</span> 対戦スタート
        </button>
        <select id="game-type" style="margin-top:5px;">
            <option value="301">01 (301)</option>
            <option value="501">01 (501)</option>
            <option value="countup">カウントアップ</option>
        </select>
    </div>

    <div id="view-game" class="card hidden">
        <h2 id="game-title">対戦中</h2>
        <div class="score-display" id="display-score">0</div>
        <input type="number" id="input-points" placeholder="得点入力" inputmode="numeric">
        <button onclick="submitScore()"><span class="material-symbols-outlined">check_circle</span> 更新</button>
        <button onclick="endGame()" style="background:#444; margin-top:20px;"><span class="material-symbols-outlined">save</span> 保存して終了</button>
    </div>
</div>

<script>
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let members = [];
    let currentGame = { type: '', score: 0, teamA: [], teamB: [] };

    function login() {
        const pass = document.getElementById('login-pass').value;
        if(pass === "1234111") { 
            showView('view-lobby'); 
            loadData(); 
        } else { alert("パスワードが違います"); }
    }

    async function loadData() { 
        await loadMembers(); 
        await loadHistory(); 
    }

    async function loadMembers() {
        const { data, error } = await supabaseClient.from('members').select('*').order('id', { ascending: true });
        if(!error) { 
            members = data.map(m => ({ ...m, status: 'none' })); 
            renderMembers(); 
        } else {
            console.error("メンバー取得失敗:", error);
        }
    }

    function renderMembers() {
        const ui = document.getElementById('member-list-ui');
        if(!ui) return;
        
        if (members.length === 0) {
            ui.innerHTML = '<p style="text-align:center; opacity:0.5;">登録されたメンバーはいません</p>';
            return;
        }

        ui.innerHTML = members.map((m, index) => `
            <li class="member-item">
                <div style="font-weight:bold; font-size:0.9rem;">${m.name}</div>
                <div class="team-btn status-${m.status}" onclick="toggleTeam(${index})">
                    ${m.status === 'none' ? '未選択' : m.status === 'A' ? 'Aチーム' : m.status === 'B' ? 'Bチーム' : '不参加'}
                </div>
                <button class="icon-btn" onclick="editMember(${m.id}, '${m.name}')"><span class="material-symbols-outlined" style="font-size:1.2rem;">edit</span></button>
                <button class="icon-btn" onclick="deleteMember(${m.id})"><span class="material-symbols-outlined" style="font-size:1.2rem;">delete</span></button>
            </li>
        `).join('');
    }

    function toggleTeam(index) {
        const states = ['none', 'A', 'B', 'skip'];
        let current = states.indexOf(members[index].status);
        members[index].status = states[(current + 1) % states.length];
        renderMembers();
    }

    async function addMember() {
        const name = document.getElementById('new-member-name').value;
        if(!name) return;
        const { error } = await supabaseClient.from('members').insert([{ name }]);
        if(!error) { 
            document.getElementById('new-member-name').value = ''; 
            await loadMembers(); 
        }
    }

    async function editMember(id, currentName) {
        const newName = prompt("名前を変更:", currentName);
        if (newName && newName !== currentName) { 
            await supabaseClient.from('members').update({ name: newName }).eq('id', id); 
            loadMembers(); 
        }
    }

    async function deleteMember(id) {
        if (confirm("削除しますか？")) { 
            await supabaseClient.from('members').delete().eq('id', id); 
            loadMembers(); 
        }
    }

    async function loadHistory() {
        const { data, error } = await supabaseClient.from('scores').select('*').order('created_at', { ascending: false });
        if(error) return;

        const histUi = document.getElementById('history-list');
        histUi.innerHTML = data.slice(0, 10).map(h => `
            <div class="history-item">
                <div>
                    <span style="color:var(--accent)">${h.game_type}</span> <span style="opacity:0.5; font-size:0.6rem;">${new Date(h.created_at).toLocaleDateString()}</span><br>
                    ${h.details.team_a_names || '-'} vs ${h.details.team_b_names || '-'} (${h.details.final_score})
                </div>
                <button class="icon-btn" onclick="deleteHistory(${h.id})"><span class="material-symbols-outlined" style="font-size:1.1rem;">delete</span></button>
            </div>
        `).join('');

        const winCount = {};
        data.forEach(h => {
            h.details.team_a_names?.split(',').forEach(n => { if(n) winCount[n] = (winCount[n] || 0) + 1; });
            h.details.team_b_names?.split(',').forEach(n => { if(n) winCount[n] = (winCount[n] || 0) + 1; });
        });

        const sorted = Object.entries(winCount).sort((a,b) => b[1] - a[1]);
        const statsUi = document.getElementById('stats-list');
        statsUi.innerHTML = sorted.length > 0 
            ? sorted.map(([name, count], i) => `<div class="stats-row"><span>${i+1}位 ${name}</span><span>${count} games</span></div>`).join('')
            : "データなし";
    }

    async function deleteHistory(id) {
        if (confirm("履歴を削除しますか？")) {
            await supabaseClient.from('scores').delete().eq('id', id);
            loadHistory();
        }
    }

    function startGame() {
        const teamA = members.filter(m => m.status === 'A').map(m => m.name);
        const teamB = members.filter(m => m.status === 'B').map(m => m.name);
        if(teamA.length === 0 && teamB.length === 0) return alert("チームを選んでください");
        currentGame.teamA = teamA; currentGame.teamB = teamB;
        const type = document.getElementById('game-type').value;
        currentGame.type = type;
        currentGame.score = (type === 'countup') ? 0 : parseInt(type);
        document.getElementById('display-score').innerText = currentGame.score;
        showView('view-game');
    }

    function submitScore() {
        const pts = parseInt(document.getElementById('input-points').value) || 0;
        if(currentGame.type === 'countup') currentGame.score += pts;
        else { currentGame.score -= pts; if(currentGame.score < 0) { alert("バースト！"); currentGame.score += pts; } }
        document.getElementById('input-points').value = '';
        document.getElementById('display-score').innerText = currentGame.score;
    }

    async function endGame() {
        await supabaseClient.from('scores').insert([{
            game_type: currentGame.type,
            details: { final_score: currentGame.score, team_a_names: currentGame.teamA.join(','), team_b_names: currentGame.teamB.join(',') }
        }]);
        alert("保存完了！"); 
        await loadData(); 
        showView('view-lobby');
    }

    function showView(viewId) {
        ['view-login', 'view-lobby', 'view-game'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>
</body>
</html>
