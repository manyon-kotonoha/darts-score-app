<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartsScoreBoard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030305;
            --card-bg: #0d0d15;
            --text: #ffffff;
            --neon-blue: #00f2ff;
            --neon-blue-glow: 0 0 10px #00f2ff, 0 0 20px #00a2ff;
            --neon-pink: #ff007f;
            --neon-pink-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --win-gold: #ffd700;
            --win-gold-glow: 0 0 15px #ffd700;
            --team-a: var(--neon-pink);
            --team-b: var(--neon-blue);
            --skip: #444;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid var(--neon-blue); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            margin-bottom: 25px; 
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: var(--neon-blue-glow);
            margin-bottom: 20px;
        }

        h2 { 
            color: var(--text); 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-top: 0; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
        }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
