<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Darts Score</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --card-bg: #080910;
            --neon-blue: #00f2ff;
            --neon-blue-glow: 0 0 10px #00f2ff, 0 0 20px #00a2ff;
            --neon-pink: #ff007f;
            --neon-pink-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --win-gold: #ffd700;
            --team-a: var(--neon-pink);
            --team-b: var(--neon-blue);
        }
        body { background-color: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); margin-bottom: 25px; }
        h1 { color: var(--neon-blue); text-shadow: var(--neon-blue-glow); text-align: center; font-size: 1.6rem; margin: 0 0 20px 0; }
        h2 { color: #fff; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 2px solid var(--neon-blue); background: transparent; color: var(--neon-blue); font-weight: bold; cursor: pointer; text-shadow: var(--neon-blue-glow); font-family: 'Orbitron', sans-serif; transition: 0.3s; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .hidden { display: none; }
        .member-item { background: rgba(255,255,255,0.03); padding: 12px; margin: 8px 0; border-radius: 15px; display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px; border: 1px solid #222; }
        .team-btn { padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; min-width: 75px; text-align: center; }
        .status-none { background: #111; color: #666; border: 1px solid #333; }
        .status-A { background: var(--team-a); color: #fff; box-shadow: var(--neon-pink-glow); }
        .status-B { background: var(--team-b); color: #fff; box-shadow: var(--neon-blue-glow); }
        .status-skip { background: #444; color: #888; }
        .icon-btn { border: none; width: auto; color: #555; text-shadow: none; padding: 5px; margin: 0; }
        .icon-btn:hover { color: var(--neon-pink); background: transparent; text-shadow: var(--neon-pink-glow); }
        .stats-container { background: #000; border-radius: 12px; padding: 15px; border: 1px solid #222; }
        .stats-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .history-item { border-bottom: 1px solid #222; padding: 12px 5px; font-size: 0.85rem; }
        .history-main { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-details { background: #000; border-radius: 10px; padding: 12px; margin-top: 10px; display: none; border: 1px solid #333; color: #aaa; font-size: 0.75rem; }
        .history-details.active { display: block; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .score-box { text-align: center; padding: 20px 10px; border-radius: 15px; background: #000; border: 2px solid #222; transition: 0.3s; }
        .score-box.active-a { border-color: var(--team-a); box-shadow: var(--neon-pink-glow); }
        .score-box.active-b { border-color: var(--team-b); box-shadow: var(--neon-blue-glow); }
        .score-val { font-size: 3rem; font-weight: 900; color: #444; }
        .active-a .score-val { color: var(--team-a); text-shadow: var(--neon-pink-glow); }
        .active-b .score-val { color: var(--team-b); text-shadow: var(--neon-blue-glow); }
        hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-blue), transparent); margin: 25px 0; }
    </style>
</head>
<body>
<div class="container">
    <div id="view-login" class="card">
        <h1> Darts Score Boad </h1>
        <input type="password" id="login-pass" placeholder="PASSWORD">
        <button onclick="login()"><span class="material-symbols-outlined">login</span> ログイン</button>
    </div>
    <div id="view-lobby" class="card hidden">
        <h2><span class="material-symbols-outlined">leaderboard</span> <span style="color:var(--win-gold)">RANKING</span></h2>
        <div id="stats-list" class="stats-container">集計中...</div>
        <hr>
        <h2><span class="material-symbols-outlined">history</span> HISTORY</h2>
        <div id="history-list" style="max-height: 200px; overflow-y: auto;"></div>
        <hr>
        <h2><span class="material-symbols-outlined">person_add</span> MEMBERS</h2>
        <div style="display:flex; gap:8px;">
            <input type="text" id="new-member-name" placeholder="名前" style="margin:0;">
            <button onclick="addMember()" style="width:auto; margin:0; border-color:var(--neon-pink); color:var(--neon-pink); text-shadow:var(--neon-pink-glow);">ADD</button>
        </div>
        <ul id="member-list-ui" style="list-style:none; padding:0; margin-top:15px;"></ul>
        <select id="game-type"><option value="301">301</option><option value="501">501</option><option value="countup">COUNT UP</option></select>
        <button onclick="startGame()" style="background:var(--neon-pink); color:#fff; border:none; text-shadow:none;">START GAME</button>
    </div>
    <div id="view-game" class="card hidden">
        <h2 id="game-title-display">PLAYING</h2>
        <div class="game-grid">
            <div id="box-A" class="score-box active-a" onclick="setTarget('A')">
                <div style="color:var(--team-a); font-size:0.7rem;">TEAM A</div>
                <div class="score-val" id="score-A">0</div>
                <div id="game-members-A" style="font-size:0.6rem; opacity:0.6;"></div>
            </div>
            <div id="box-B" class="score-box" onclick="setTarget('B')">
                <div style="color:var(--team-b); font-size:0.7rem;">TEAM B</div>
                <div class="score-val" id="score-B">0</div>
                <div id="game-members-B" style="font-size:0.6rem; opacity:0.6;"></div>
            </div>
        </div>
        <input type="number" id="input-points" placeholder="SCORE" inputmode="numeric" style="font-size:1.5rem; text-align:center;">
        <button onclick="submitScore()">ENTER SCORE</button>
        <button onclick="finishGame()" style="border-color:#555; color:#888; text-shadow:none; margin-top:20px;">FINISH</button>
    </div>
    <div id="view-result" class="card hidden">
        <h1 id="winner-announcement" style="color:var(--win-gold); text-shadow:0 0 10px var(--win-gold);">WINNER</h1>
        <div class="stats-container">
            <div class="stats-row"><span>TEAM A</span><span id="result-score-A"></span></div>
            <div class="stats-row"><span>TEAM B</span><span id="result-score-B"></span></div>
        </div>
        <button onclick="saveAndExit()"><span class="material-symbols-outlined">save</span> SAVE & EXIT</button>
    </div>
</div>
<script>
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let members = [], currentTarget = 'A', currentGame = {};

    function login() {
        if(document.getElementById('login-pass').value === "1234111") { showView('view-lobby'); loadData(); }
        else alert("パスワードが違います");
    }
    async function loadData() { await loadMembers(); await loadHistory(); }
    async function loadMembers() {
        const { data, error } = await supabaseClient.from('members').select('*').order('id', { ascending: true });
        if(!error) { members = data.map(m => ({ ...m, status: 'none' })); renderMembers(); }
    }
    function renderMembers() {
        const ui = document.getElementById('member-list-ui');
        ui.innerHTML = members.map((m, i) => `
            <li class="member-item">
                <div style="font-weight:bold;">${m.name}</div>
                <div class="team-btn status-${m.status}" onclick="toggleTeam(${i})">${m.status==='none'?'SELECT':m.status==='A'?'TEAM A':m.status==='B'?'TEAM B':'SKIP'}</div>
                <button class="icon-btn" onclick="deleteMember(${m.id})"><span class="material-symbols-outlined">delete</span></button>
            </li>`).join('');
    }
    function toggleTeam(i) {
        const s = ['none','A','B','skip'];
        members[i].status = s[(s.indexOf(members[i].status)+1)%4];
        renderMembers();
    }
    async function addMember() {
        const n = document.getElementById('new-member-name').value;
        if(n) { await supabaseClient.from('members').insert([{ name: n }]); document.getElementById('new-member-name').value=''; loadMembers(); }
    }
    async function deleteMember(id) { if(confirm("削除しますか？")) { await supabaseClient.from('members').delete().eq('id', id); loadMembers(); } }
    function startGame() {
        const tA = members.filter(m => m.status === 'A').map(m => m.name);
        const tB = members.filter(m => m.status === 'B').map(m => m.name);
        if(!tA.length && !tB.length) return alert("チームを選択してください");
        const type = document.getElementById('game-type').value;
        currentGame = { type, teamA: tA, teamB: tB, scoreA: type==='countup'?0:parseInt(type), scoreB: type==='countup'?0:parseInt(type) };
        document.getElementById('game-members-A').innerText = tA.join(',');
        document.getElementById('game-members-B').innerText = tB.join(',');
        document.getElementById('game-title-display').innerText = type.toUpperCase();
        updateScoreDisplay(); setTarget('A'); showView('view-game');
    }
    function setTarget(t) {
        currentTarget = t;
        document.getElementById('box-A').className = t==='A'?'score-box active-a':'score-box';
        document.getElementById('box-B').className = t==='B'?'score-box active-b':'score-box';
    }
    function submitScore() {
        const p = parseInt(document.getElementById('input-points').value)||0;
        const k = `score${currentTarget}`;
        if(currentGame.type==='countup') currentGame[k]+=p;
        else { if(currentGame[k]-p < 0) alert("BUST!"); else currentGame[k]-=p; }
        document.getElementById('input-points').value=''; updateScoreDisplay();
    }
    function updateScoreDisplay() {
        document.getElementById('score-A').innerText = currentGame.scoreA;
        document.getElementById('score-B').innerText = currentGame.scoreB;
    }
    function finishGame() {
        let t = "", sA = currentGame.scoreA, sB = currentGame.scoreB;
        if(currentGame.type==='countup') t = sA>sB?"TEAM A WIN!":sB>sA?"TEAM B WIN!":"DRAW";
        else t = sA<sB?"TEAM A WIN!":sB<sA?"TEAM B WIN!":"DRAW";
        document.getElementById('winner-announcement').innerText = t;
        document.getElementById('result-score-A').innerText = sA;
        document.getElementById('result-score-B').innerText = sB;
        showView('view-result');
    }
    async function saveAndExit() {
        await supabaseClient.from('scores').insert([{
            game_type: currentGame.type,
            details: { final_score: `A:${currentGame.scoreA}-B:${currentGame.scoreB}`, team_a_names: currentGame.teamA.join(','), team_b_names: currentGame.teamB.join(','), winner: document.getElementById('winner-announcement').innerText }
        }]);
        await loadData(); showView('view-lobby');
    }
    async function loadHistory() {
        const { data } = await supabaseClient.from('scores').select('*').order('created_at', { ascending: false });
        if(!data) return;
        document.getElementById('history-list').innerHTML = data.slice(0, 10).map((h, i) => `
            <div class="history-item">
                <div class="history-main" onclick="toggleDetails(${i})">
                    <span style="color:var(--neon-blue)">${h.game_type}</span>
                    <span>${h.details.final_score}</span>
                    <span class="material-symbols-outlined" style="font-size:1rem">expand_more</span>
                </div>
                <div id="details-${i}" class="history-details">
                    <div>A: ${h.details.team_a_names}</div><div>B: ${h.details.team_b_names}</div>
                </div>
            </div>`).join('');
        const wins = {};
        data.forEach(h => {
            const winners = h.details.winner.includes("A WIN") ? h.details.team_a_names : h.details.winner.includes("B WIN") ? h.details.team_b_names : null;
            if(winners) winners.split(',').forEach(n => wins[n] = (wins[n]||0)+1);
        });
        const sorted = Object.entries(wins).sort((a,b)=>b[1]-a[1]);
        document.getElementById('stats-list').innerHTML = sorted.map(([n, c], i)=>`<div class="stats-row"><span>${i+1}. ${n}</span><span>${c}勝</span></div>`).join('') || "NO DATA";
    }
    function toggleDetails(i) { document.getElementById(`details-${i}`).classList.toggle('active'); }
    function showView(v) { ['view-login','view-lobby','view-game','view-result'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v).classList.remove('hidden'); }
</script>
</body>
</html>
