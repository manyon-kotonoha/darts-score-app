<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Darts Score</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16161d;
            --primary: #7b2cbf;
            --secondary: #3c096c;
            --accent: #9d4edd;
            --text: #e0e1dd;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--secondary);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        h1, h2 { color: var(--accent); text-align: center; margin-top: 0; }
        
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        input, select {
            background: #240046;
            color: white;
            border: 1px solid var(--secondary);
        }

        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); opacity: 0.8; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
        
        /* スコア表示 */
        .score-display {
            font-size: 3rem;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px var(--accent);
            margin: 10px 0;
        }

        .member-list { list-style: none; padding: 0; }
        .member-item {
            background: #1e1e26;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card">
        <h1>ダーツスコア</h1>
        <p style="text-align:center; opacity:0.7;">Enter Passcode</p>
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="login()">ログイン</button>
    </div>

    <div id="view-lobby" class="card hidden">
        <h2>メンバー</h2>
        <div class="grid-2">
            <input type="text" id="new-member-name" placeholder="Name">
            <button onclick="addMember()">メンバー追加</button>
        </div>
        <ul id="member-list-ui" class="member-list"></ul>
        <hr style="border:0.5px solid var(--secondary); margin:20px 0;">
        <h2>ゲーム選択</h2>
        <select id="game-type">
            <option value="301">Zero One (301)</option>
            <option value="501">Zero One (501)</option>
            <option value="countup">Count Up</option>
        </select>
        <button onclick="startGame()" style="background:var(--accent)">ゲーム開始</button>
    </div>

    <div id="view-game" class="card hidden">
        <h2 id="current-player-name">投げる人</h2>
        <div class="score-display" id="display-score">0</div>
        <input type="number" id="input-points" placeholder="Input Points" inputmode="numeric">
        <button onclick="submitScore()">スコア更新</button>
        <button onclick="endGame()" style="background:#444; margin-top:20px;">ゲーム終了</button>
    </div>
</div>

<script>
    // --- Supabase設定 ---
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let members = [];
    let currentGame = { type: '', score: 0, history: [] };

    // 1. ログイン処理
    function login() {
        const pass = document.getElementById('login-pass').value;
        if(pass === "1234111") { // パスワードは自由に変更してください
            showView('view-lobby');
            loadMembers();
        } else {
            alert("Wrong Password");
        }
    }

    // 2. メンバー管理
    async function addMember() {
        const name = document.getElementById('new-member-name').value;
        if(!name) return;
        const { data, error } = await supabase.from('members').insert([{ name }]).select();
        if(!error) {
            document.getElementById('new-member-name').value = '';
            loadMembers();
        }
    }

    async function loadMembers() {
        const { data, error } = await supabase.from('members').select('*');
        if(!error) {
            members = data;
            const ui = document.getElementById('member-list-ui');
            ui.innerHTML = data.map(m => `<li class="member-item">${m.name}</li>`).join('');
        }
    }

    // 3. ゲーム進行
    function startGame() {
        const type = document.getElementById('game-type').value;
        currentGame.type = type;
        currentGame.score = (type === 'countup') ? 0 : parseInt(type);
        updateScoreDisplay();
        showView('view-game');
    }

    function submitScore() {
        const points = parseInt(document.getElementById('input-points').value) || 0;
        if(currentGame.type === 'countup') {
            currentGame.score += points;
        } else {
            currentGame.score -= points;
            if(currentGame.score < 0) {
                alert("Bust!");
                currentGame.score += points; // 戻す
            }
        }
        document.getElementById('input-points').value = '';
        updateScoreDisplay();
        
        if(currentGame.type !== 'countup' && currentGame.score === 0) {
            alert("Game Clear!");
            endGame();
        }
    }

    async function endGame() {
        // 結果をSupabaseに保存
        await supabase.from('scores').insert([{
            game_type: currentGame.type,
            details: { final_score: currentGame.score }
        }]);
        alert("Saved to Server!");
        showView('view-lobby');
    }

    function updateScoreDisplay() {
        document.getElementById('display-score').innerText = currentGame.score;
    }

    function showView(viewId) {
        ['view-login', 'view-lobby', 'view-game'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>

</body>
</html>
