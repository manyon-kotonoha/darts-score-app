<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Darts Score</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16161d;
            --primary: #7b2cbf;
            --secondary: #3c096c;
            --accent: #9d4edd;
            --text: #e0e1dd;
            --team-a: #ff4d6d;
            --team-b: #00b4d8;
            --skip: #6c757d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; padding: 20px; }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--secondary);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        h1, h2 { color: var(--accent); text-align: center; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* アイコンの基本スタイル */
        .icon { vertical-align: middle; font-size: 20px; }

        input, select, button {
            width: 100%; padding: 14px; margin: 8px 0;
            border-radius: 10px; border: none; outline: none; box-sizing: border-box;
        }
        input, select { background: #240046; color: white; border: 1px solid var(--secondary); }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        
        .hidden { display: none; }
        .member-item {
            background: #1e1e26; padding: 10px; margin: 5px 0; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .team-badge {
            padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold;
            min-width: 75px; text-align: center; border: 1px solid transparent;
        }
        .status-none { border-color: #444; color: #888; }
        .status-A { background: var(--team-a); color: white; }
        .status-B { background: var(--team-b); color: white; }
        .status-skip { background: var(--skip); color: white; }

        .history-item {
            font-size: 0.85rem; padding: 10px; border-bottom: 1px solid #333; display: flex; align-items: flex-start; gap: 10px;
        }
        .score-display { font-size: 4rem; text-align: center; font-weight: bold; text-shadow: 0 0 10px var(--accent); margin: 20px 0; }
        
        .del-btn {
            width: auto; padding: 5px 8px; margin: 0 0 0 10px;
            background: transparent; color: #555; border-radius: 5px;
        }
        .del-btn:hover { color: #ff4d6d; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card">
        <h1><span class="material-symbols-outlined">target</span> Midnight Darts</h1>
        <input type="password" id="login-pass" placeholder="パスコードを入力">
        <button onclick="login()">
            <span class="material-symbols-outlined">login</span> ログイン
        </button>
    </div>

    <div id="view-lobby" class="card hidden">
        <section>
            <h2><span class="material-symbols-outlined">history</span> ゲーム履歴</h2>
            <div id="history-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px; background: #000; border-radius: 8px;">
                <p style="text-align:center; padding:10px; opacity:0.5;">履歴を読み込み中...</p>
            </div>
        </section>

        <section>
            <h2><span class="material-symbols-outlined">group</span> 対戦メンバー選択</h2>
            <ul id="member-list-ui" style="list-style:none; padding:0;"></ul>
            
            <select id="game-type">
                <option value="301">01 (301)</option>
                <option value="501">01 (501)</option>
                <option value="countup">カウントアップ</option>
            </select>
            <button onclick="startGame()" style="background:var(--accent)">
                <span class="material-symbols-outlined">play_arrow</span> ゲーム開始
            </button>
        </section>

        <hr style="border:0.5px solid var(--secondary); margin:25px 0;">

        <section>
            <h2><span class="material-symbols-outlined">person_add</span> メンバー登録</h2>
            <input type="text" id="new-member-name" placeholder="新しい名前を入力">
            <button onclick="addMember()">
                <span class="material-symbols-outlined">add</span> 登録する
            </button>
        </section>
    </div>

    <div id="view-game" class="card hidden">
        <h2 id="game-title">対戦中</h2>
        <div class="score-display" id="display-score">0</div>
        <input type="number" id="input-points" placeholder="得点を入力" inputmode="numeric">
        <button onclick="submitScore()">
            <span class="material-symbols-outlined">check_circle</span> スコア更新
        </button>
        <button onclick="endGame()" style="background:#444; margin-top:20px;">
            <span class="material-symbols-outlined">save</span> 終了して保存
        </button>
    </div>
</div>

<script>
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let members = [];
    let currentGame = { type: '', score: 0, teamA: [], teamB: [] };

    function login() {
        const pass = document.getElementById('login-pass').value;
        if(pass === "1234111") { 
            showView('view-lobby');
            loadData();
        } else {
            alert("パスワードが違います");
        }
    }

    async function loadData() {
        loadMembers();
        loadHistory();
    }

    async function loadMembers() {
        const { data, error } = await supabaseClient.from('members').select('*');
        if(!error) {
            members = data.map(m => ({ ...m, status: 'none' }));
            renderMembers();
        }
    }

    function renderMembers() {
        const ui = document.getElementById('member-list-ui');
        ui.innerHTML = members.map((m, index) => `
            <li class="member-item">
                <span style="flex:1; display:flex; align-items:center; gap:8px;">
                    <span class="material-symbols-outlined" style="font-size:18px; color:var(--accent)">person</span>
                    ${m.name}
                </span>
                <span class="team-badge status-${m.status}" onclick="toggleTeam(${index})">
                    ${m.status === 'none' ? '未選択' : m.status === 'A' ? 'Aチーム' : m.status === 'B' ? 'Bチーム' : '不参加'}
                </span>
                <button class="del-btn" onclick="deleteMember(${m.id})">
                    <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
                </button>
            </li>
        `).join('');
    }

    function toggleTeam(index) {
        const states = ['none', 'A', 'B', 'skip'];
        let currentIdx = states.indexOf(members[index].status);
        members[index].status = states[(currentIdx + 1) % states.length];
        renderMembers();
    }

    async function addMember() {
        const name = document.getElementById('new-member-name').value;
        if(!name) return;
        const { error } = await supabaseClient.from('members').insert([{ name }]);
        if(!error) {
            document.getElementById('new-member-name').value = '';
            loadMembers();
        }
    }

    async function deleteMember(id) {
        if (!confirm("このメンバーを削除しますか？")) return;
        const { error } = await supabaseClient.from('members').delete().eq('id', id);
        if (!error) loadMembers();
    }

    async function loadHistory() {
        const { data, error } = await supabaseClient.from('scores').select('*').order('created_at', { ascending: false }).limit(5);
        const histUi = document.getElementById('history-list');
        if(!error && data.length > 0) {
            histUi.innerHTML = data.map(h => `
                <div class="history-item">
                    <span class="material-symbols-outlined" style="color:var(--accent)">workspace_premium</span>
                    <div>
                        <div style="font-weight:bold; color:var(--accent)">[${h.game_type}] ${new Date(h.created_at).toLocaleDateString()}</div>
                        ${h.details.team_a_names || '-'} vs ${h.details.team_b_names || '-'} <br>
                        スコア: ${h.details.final_score}
                    </div>
                </div>
            `).join('');
        } else {
            histUi.innerHTML = `<p style="text-align:center; padding:10px; opacity:0.5;">履歴はありません</p>`;
        }
    }

    function startGame() {
        const teamA = members.filter(m => m.status === 'A').map(m => m.name);
        const teamB = members.filter(m => m.status === 'B').map(m => m.name);
        if(teamA.length === 0 && teamB.length === 0) {
            alert("チームを振り分けてください");
            return;
        }
        currentGame.teamA = teamA;
        currentGame.teamB = teamB;
        const type = document.getElementById('game-type').value;
        currentGame.type = type;
        currentGame.score = (type === 'countup') ? 0 : parseInt(type);
        document.getElementById('game-title').innerText = type;
        updateScoreDisplay();
        showView('view-game');
    }

    function submitScore() {
        const points = parseInt(document.getElementById('input-points').value) || 0;
        if(currentGame.type === 'countup') currentGame.score += points;
        else {
            currentGame.score -= points;
            if(currentGame.score < 0) { alert("バースト！"); currentGame.score += points; }
        }
        document.getElementById('input-points').value = '';
        updateScoreDisplay();
    }

    async function endGame() {
        await supabaseClient.from('scores').insert([{
            game_type: currentGame.type,
            details: { 
                final_score: currentGame.score,
                team_a_names: currentGame.teamA.join(','),
                team_b_names: currentGame.teamB.join(',')
            }
        }]);
        alert("保存完了！");
        loadData();
        showView('view-lobby');
    }

    function updateScoreDisplay() {
        document.getElementById('display-score').innerText = currentGame.score;
    }

    function showView(viewId) {
        ['view-login', 'view-lobby', 'view-game'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>
</body>
</html>
