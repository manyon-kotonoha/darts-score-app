<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartsScoreBoard</title>
<!-- タブのアイコン（ファビコン）の設定 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ネオンカラー設定 */
            --bg: #030305;
            --card-bg: #0d0d15;
            --text: #ffffff;
            --neon-blue: #00f2ff;
            --neon-blue-glow: 0 0 10px #00f2ff, 0 0 20px #00a2ff;
            --neon-pink: #ff007f;
            --neon-pink-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --win-gold: #ffd700;
            --win-gold-glow: 0 0 15px #ffd700;
            --team-a: var(--neon-pink);
            --team-b: var(--neon-blue);
            --skip: #444;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }

        /* ネオンカードスタイル */
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid var(--neon-blue); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            margin-bottom: 25px; 
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: var(--neon-blue-glow);
            margin-bottom: 20px;
        }

        h2 { 
            color: var(--text); 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-top: 0; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
        }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

        /* ネオンボタン */
        button { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 2px solid var(--neon-blue); 
            background: transparent;
            color: var(--neon-blue);
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            text-shadow: var(--neon-blue-glow);
            transition: 0.3s;
        }

        button:active { background: var(--neon-blue); color: #000; }

        .hidden { display: none; }

        /* メンバーリスト */
        .member-item { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 15px; 
            display: grid; 
            grid-template-columns: 1fr auto auto auto; 
            align-items: center; 
            gap: 10px; 
            border: 1px solid #222;
        }

        .team-btn { 
            padding: 8px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.75rem; 
            font-weight: bold; 
            min-width: 75px; 
            text-align: center; 
        }

        .status-none { background: #222; color: #777; }
        .status-A { background: var(--team-a); color: white; box-shadow: var(--neon-pink-glow); }
        .status-B { background: var(--team-b); color: white; box-shadow: var(--neon-blue-glow); }
        .status-skip { background: var(--skip); color: white; }

        .icon-btn { border: none; width: auto; color: #555; padding: 5px; margin: 0; box-shadow: none; text-shadow: none; }
        .icon-btn:hover { color: var(--neon-pink); }

        /* 履歴・ランキング */
        .stats-container { background: #000; border-radius: 12px; padding: 15px; margin-bottom: 15px; font-size: 0.9rem; border: 1px solid #222; }
        .stats-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        
        .history-item { border-bottom: 1px solid #222; padding: 15px 5px; }
        .history-main { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-details { background: #000; border-radius: 12px; padding: 12px; margin-top: 10px; font-size: 0.8rem; display: none; border: 1px solid #333; }
        .history-details.active { display: block; }

        /* 対戦中 */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .score-box { 
            text-align: center; 
            padding: 20px 10px; 
            border-radius: 15px; 
            background: #000; 
            border: 2px solid #222; 
            cursor: pointer; 
        }
        .score-box.active-a { border-color: var(--team-a); box-shadow: var(--neon-pink-glow); }
        .score-box.active-b { border-color: var(--team-b); box-shadow: var(--neon-blue-glow); }

        .team-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; }
        .score-val { font-size: 3rem; font-weight: 900; font-family: 'Orbitron', sans-serif; color: #444; }
        .active-a .score-val { color: var(--team-a); text-shadow: var(--neon-pink-glow); }
        .active-b .score-val { color: var(--team-b); text-shadow: var(--neon-blue-glow); }
        
        .members-small { font-size: 0.7rem; opacity: 0.6; min-height: 1.5rem; }

        hr { border: 0; border-top: 1px solid #333; margin: 25px 0; }
    </style>
</head>
<div class="container">
    <div id="view-login" class="card">
        <h1>Darts Score Board</h1>
        <input type="password" id="login-pass" placeholder="パスコードを入力">
        <button onclick="login()"><span class="material-symbols-outlined">login</span> ログイン</button>
    </div>

    <div id="view-lobby" class="card hidden">
        <section>
            <h2><span class="material-symbols-outlined">leaderboard</span> 勝利数ランキング</h2>
            <div id="stats-list" class="stats-container">集計中...</div>
        </section>

        <section>
            <h2><span class="material-symbols-outlined">history</span> 直近の履歴</h2>
            <div id="history-list" style="max-height: 250px; overflow-y: auto; background: #000; border-radius: 12px; padding: 5px; border: 1px solid #222;"></div>
        </section>

        <hr>

        <section>
            <h2><span class="material-symbols-outlined">person_add</span> メンバー登録</h2>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-member-name" placeholder="名前を入力" style="margin:0;">
                <button onclick="addMember()" style="width: auto; margin:0; border-color:var(--neon-pink); color:var(--neon-pink); text-shadow:var(--neon-pink-glow);"><span class="material-symbols-outlined">add</span></button>
            </div>
            <ul id="member-list-ui" style="list-style:none; padding:0; margin-top: 20px;"></ul>
        </section>

        <hr>
        <select id="game-type" style="margin-top:5px;">
            <option value="301">01 (301)</option>
            <option value="501">01 (501)</option>
            <option value="countup">カウントアップ</option>
        </select>
        <button onclick="startGame()" style="border-color:var(--neon-blue); margin-top:10px;">
            <span class="material-symbols-outlined">play_arrow</span> 対戦スタート
        </button>
    </div>

    <div id="view-game" class="card hidden">
        <h2 id="game-title-display">対戦中</h2>
        <div class="game-grid">
            <div id="box-A" class="score-box active-a" onclick="setTarget('A')">
                <div class="team-label" style="color:var(--team-a)">TEAM A</div>
                <div class="members-small" id="game-members-A"></div>
                <div class="score-val" id="score-A">0</div>
            </div>
            <div id="box-B" class="score-box" onclick="setTarget('B')">
                <div class="team-label" style="color:var(--team-b)">TEAM B</div>
                <div class="members-small" id="game-members-B"></div>
                <div class="score-val" id="score-B">0</div>
            </div>
        </div>
        <div style="text-align: center; margin-bottom: 10px; font-size: 0.8rem; opacity: 0.8;">
            入力対象: <strong id="target-label">TEAM A</strong>
        </div>
        <input type="number" id="input-points" placeholder="現在のスコアを入力" inputmode="numeric" style="font-size: 2rem; text-align: center; border-color: #444;">
        
        <div style="display: flex; gap: 10px;">
            <button onclick="submitScore()" style="flex: 3; border-color:var(--neon-blue);"><span class="material-symbols-outlined">check_circle</span> 更新</button>
            <button onclick="undoScore()" style="flex: 1; border-color:var(--skip); color:#ccc; text-shadow:none;"><span class="material-symbols-outlined">undo</span></button>
        </div>

        <button onclick="finishGame()" style="border-color:#444; color:#666; text-shadow:none; margin-top:20px;"><span class="material-symbols-outlined">sports_score</span> ゲーム終了・判定</button>
    </div>

    <div id="view-result" class="card hidden">
        <h2 style="justify-content: center; color: var(--win-gold); text-shadow: var(--win-gold-glow);">
            <span class="material-symbols-outlined">workspace_premium</span> 結果発表
        </h2>
        <div id="winner-announcement" style="text-align: center; font-size: 2.2rem; font-weight: bold; margin: 25px 0;"></div>
        <div class="stats-container">
            <div class="stats-row"><span>TEAM A</span><span id="result-score-A"></span></div>
            <div class="stats-row"><span>TEAM B</span><span id="result-score-B"></span></div>
        </div>
        <button onclick="saveAndExit()" style="border-color:var(--neon-pink); color:var(--neon-pink); text-shadow: var(--neon-pink-glow); margin-top:20px;"><span class="material-symbols-outlined">save</span> 履歴を保存してTOPへ</button>
        <button onclick="showView('view-lobby')" style="border:none; color:#555; text-shadow:none;">保存せずに戻る</button>
    </div>
</div>

<script>
    const SB_URL = "https://zgyqsoypkzcurtuxuhew.supabase.co";
    const SB_KEY = "sb_publishable_vcc3mgwGy_DejNzF1ucz_A_2y6Gv7IC";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let members = [];
    let currentGame = { type: '', teamA: [], teamB: [], scoreA: 0, scoreB: 0 };
    let scoreHistory = []; // ★履歴保存用スタック
    let currentTarget = 'A';

    /* --- 既存のログイン・ロード関数 --- */
function login() {
    const passInput = document.getElementById('login-pass');
    const pass = passInput.value;
    if(pass === "1234111") { 
        passInput.value = ""; // ★ここでパスワードを消去
        showView('view-lobby'); 
        loadData(); 
    }
    else { alert("パスワードが違います"); }
}
    async function loadData() { await loadMembers(); await loadHistory(); }
    async function loadMembers() {
        const { data, error } = await supabaseClient.from('members').select('*').order('id', { ascending: true });
        if(!error) { members = data.map(m => ({ ...m, status: 'none' })); renderMembers(); }
    }
    function renderMembers() {
        const ui = document.getElementById('member-list-ui');
        if(!ui) return;
        ui.innerHTML = members.length === 0 ? '<p style="text-align:center; opacity:0.5;">登録なし</p>' : 
            members.map((m, index) => `
                <li class="member-item">
                    <div style="font-weight:bold; font-size:0.9rem;">${m.name}</div>
                    <div class="team-btn status-${m.status}" onclick="toggleTeam(${index})">
                        ${m.status === 'none' ? '未選択' : m.status === 'A' ? 'Aチーム' : m.status === 'B' ? 'Bチーム' : '不参加'}
                    </div>
                    <button class="icon-btn" onclick="deleteMember(${m.id})"><span class="material-symbols-outlined" style="font-size:1.2rem;">delete</span></button>
                </li>
            `).join('');
    }
    function toggleTeam(index) {
        const states = ['none', 'A', 'B', 'skip'];
        members[index].status = states[(states.indexOf(members[index].status) + 1) % states.length];
        renderMembers();
    }
    async function addMember() {
        const name = document.getElementById('new-member-name').value;
        if(name) { await supabaseClient.from('members').insert([{ name }]); document.getElementById('new-member-name').value = ''; loadMembers(); }
    }
    async function deleteMember(id) { if (confirm("削除しますか？")) { await supabaseClient.from('members').delete().eq('id', id); loadMembers(); } }

    /* --- ゲームロジック --- */
    function startGame() {
        const teamA = members.filter(m => m.status === 'A').map(m => m.name);
        const teamB = members.filter(m => m.status === 'B').map(m => m.name);
        if(teamA.length === 0 && teamB.length === 0) return alert("チームを選んでください");

        const type = document.getElementById('game-type').value;
        currentGame = { type, teamA, teamB, scoreA: (type === 'countup' ? 0 : parseInt(type)), scoreB: (type === 'countup' ? 0 : parseInt(type)) };
        scoreHistory = []; // 履歴リセット
        
        document.getElementById('game-members-A').innerText = teamA.join(', ');
        document.getElementById('game-members-B').innerText = teamB.join(', ');
        document.getElementById('game-title-display').innerText = type.toUpperCase();
        
        updateScoreDisplay();
        setTarget('A');
        showView('view-game');
    }

    function setTarget(team) {
        currentTarget = team;
        document.getElementById('box-A').className = team === 'A' ? 'score-box active-a' : 'score-box';
        document.getElementById('box-B').className = team === 'B' ? 'score-box active-b' : 'score-box';
        document.getElementById('target-label').innerText = `TEAM ${team}`;
        document.getElementById('target-label').style.color = team === 'A' ? 'var(--team-a)' : 'var(--team-b)';
    }

    function submitScore() {
        const val = parseInt(document.getElementById('input-points').value);
        if (isNaN(val)) return;

        // ★現在の状態を履歴に保存（ディープコピー）
        scoreHistory.push({ scoreA: currentGame.scoreA, scoreB: currentGame.scoreB });

        const key = `score${currentTarget}`;
        currentGame[key] = val; // そのまま更新

        document.getElementById('input-points').value = '';
        updateScoreDisplay();
    }

    // ★一つ前に戻す関数
    function undoScore() {
        if (scoreHistory.length === 0) return;
        const lastState = scoreHistory.pop();
        currentGame.scoreA = lastState.scoreA;
        currentGame.scoreB = lastState.scoreB;
        updateScoreDisplay();
    }

    function updateScoreDisplay() {
        document.getElementById('score-A').innerText = currentGame.scoreA;
        document.getElementById('score-B').innerText = currentGame.scoreB;
    }

    /* --- 以下、履歴保存・表示等の既存関数 --- */
    function finishGame() {
        let text = "";
        const sA = currentGame.scoreA; const sB = currentGame.scoreB;
        if (currentGame.type === 'countup') {
            if (sA > sB) text = "TEAM A WIN!"; else if (sB > sA) text = "TEAM B WIN!"; else text = "DRAW GAME";
        } else {
            if (sA < sB) text = "TEAM A WIN!"; else if (sB < sA) text = "TEAM B WIN!"; else text = "DRAW GAME";
        }
        const winAnn = document.getElementById('winner-announcement');
        winAnn.innerText = text;
        if(text.includes("A WIN")) { winAnn.style.color = "var(--neon-pink)"; winAnn.style.textShadow = "var(--neon-pink-glow)"; }
        else if(text.includes("B WIN")) { winAnn.style.color = "var(--neon-blue)"; winAnn.style.textShadow = "var(--neon-blue-glow)"; }
        else { winAnn.style.color = "white"; winAnn.style.textShadow = "none"; }
        document.getElementById('result-score-A').innerText = sA;
        document.getElementById('result-score-B').innerText = sB;
        showView('view-result');
    }

    async function saveAndExit() {
        await supabaseClient.from('scores').insert([{
            game_type: currentGame.type,
            details: { final_score: `A:${currentGame.scoreA} - B:${currentGame.scoreB}`, team_a_names: currentGame.teamA.join(','), team_b_names: currentGame.teamB.join(','), winner: document.getElementById('winner-announcement').innerText }
        }]);
        await loadData();
        showView('view-lobby');
    }

    async function loadHistory() {
        const { data, error } = await supabaseClient.from('scores').select('*').order('created_at', { ascending: false });
        if(error) return;
        const histUi = document.getElementById('history-list');
        histUi.innerHTML = data.slice(0, 10).map((h, i) => {
            const winTxt = h.details.winner || "";
            const isAWin = winTxt.includes("TEAM A WIN");
            const isBWin = winTxt.includes("TEAM B WIN");
            const namesA = h.details.team_a_names.split(',').map(n => isAWin ? `${n}👑` : n).join(', ');
            const namesB = h.details.team_b_names.split(',').map(n => isBWin ? `${n}👑` : n).join(', ');
            return `
                <div class="history-item">
                    <div class="history-main" onclick="toggleDetails(${i})">
                        <div style="flex-grow:1;">
                            <span style="color:var(--neon-blue); font-weight:bold;">${h.game_type}</span>
                            <span style="${isAWin ? 'color:var(--win-gold); text-shadow:var(--win-gold-glow);' : 'color:var(--team-a);'} font-weight:bold; margin-left:8px;">A</span>
                            <span style="opacity:0.3;"> vs </span>
                            <span style="${isBWin ? 'color:var(--win-gold); text-shadow:var(--win-gold-glow);' : 'color:var(--team-b);'} font-weight:bold;">B</span>
                            <span style="margin-left:8px; opacity:0.6; font-size:0.75rem;">(${h.details.final_score})</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <span class="material-symbols-outlined" style="font-size:1.2rem; opacity:0.3;">expand_more</span>
                            <button class="icon-btn" onclick="event.stopPropagation(); deleteHistory(${h.id})">
                                <span class="material-symbols-outlined" style="font-size:1.1rem;">delete</span>
                            </button>
                        </div>
                    </div>
                    <div id="details-${i}" class="history-details">
                        <div style="margin-bottom:5px;"><strong style="color:var(--team-a)">Team A:</strong> ${namesA}</div>
                        <div><strong style="color:var(--team-b)">Team B:</strong> ${namesB}</div>
                        <div style="margin-top:8px; opacity:0.4; font-size:0.6rem;">日時: ${new Date(h.created_at).toLocaleString()}</div>
                    </div>
                </div>`;
        }).join('');

        const winCount = {};
        data.forEach(h => {
            const winTxt = h.details.winner || "";
            const winners = winTxt.includes("TEAM A WIN") ? h.details.team_a_names : winTxt.includes("TEAM B WIN") ? h.details.team_b_names : null;
            if(winners) winners.split(',').forEach(n => { if(n) winCount[n] = (winCount[n] || 0) + 1; });
        });
        const sorted = Object.entries(winCount).sort((a,b) => b[1] - a[1]);
        document.getElementById('stats-list').innerHTML = sorted.length > 0 ? sorted.map(([name, count], i) => `
            <div class="stats-row">
                <span style="${i===0 ? 'color:var(--win-gold); text-shadow:var(--win-gold-glow); font-weight:bold;' : ''}">${i+1}位 ${name}</span>
                <span>${count}勝</span>
            </div>`).join('') : "データなし";
    }

    function toggleDetails(index) {
        const el = document.getElementById(`details-${index}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    async function deleteHistory(id) { if (confirm("削除しますか？")) { await supabaseClient.from('scores').delete().eq('id', id); loadHistory(); } }

    function showView(viewId) {
        ['view-login', 'view-lobby', 'view-game', 'view-result'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>
</html>
